{% extends 'common/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="h3 mb-4"><i class="bi bi-pencil-square"></i> Edit Review</h1>
        <div class="card shadow-sm">
            <div class="card-body django-form">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-primary" type="submit">Save changes</button>
                        <a class="btn btn-outline-secondary"
                           href="{% url 'offer-detail' object.booking.offer.pk %}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
