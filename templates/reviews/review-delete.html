{% extends 'common/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="alert alert-warning d-flex gap-2 align-items-start">
            <i class="bi bi-exclamation-triangle-fill fs-5 mt-1"></i>
            <div>
                <strong>Delete this review?</strong><br>
                This action cannot be undone.
            </div>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <p class="text-muted mb-3">
                    Your review for
                    <strong>
                        <a href="{% url 'profile-detail' object.mentor.username %}" class="text-decoration-none">
                            {{ object.mentor.username }}
                        </a>
                    </strong>
                    ({{ object.rating }}/5 stars) will be permanently removed.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button class="btn btn-danger" type="submit">Yes, delete it</button>
                        <a class="btn btn-outline-secondary"
                           href="{% url 'offer-detail' object.booking.offer.pk %}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
