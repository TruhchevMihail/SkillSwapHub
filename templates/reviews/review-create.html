{% extends 'common/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="h3 mb-4"><i class="bi bi-star-half"></i> Write a Review</h1>

        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <dl class="info-grid mb-0">
                    <dt>Offer</dt>   <dd>{{ booking.offer.title }}</dd>
                    <dt>Mentor</dt>  <dd>{{ booking.offer.owner.username }}</dd>
                    <dt>Session</dt> <dd>{{ booking.preferred_date|date:"d M Y, H:i" }}</dd>
                </dl>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body django-form">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-primary" type="submit">Submit review</button>
                        <a class="btn btn-outline-secondary" href="{% url 'booking-detail' booking.pk %}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
