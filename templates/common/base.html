{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <style>
        body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

{% include 'common/partials/navbar.html' %}

<main class="container my-4 flex-grow-1">
    {% include 'common/partials/messages.html' %}
    {% block content %}{% endblock %}
</main>

{% include 'common/partials/footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── Scroll-reveal ── */
(function () {
    const targets = document.querySelectorAll(
        '.card, .stat-card, .alert, .list-group-item, .offer-card, h1, h2, .hero'
    );
    targets.forEach((el, i) => {
        el.classList.add('reveal');
        if (i % 4 === 1) el.classList.add('reveal-delay-1');
        else if (i % 4 === 2) el.classList.add('reveal-delay-2');
        else if (i % 4 === 3) el.classList.add('reveal-delay-3');
    });

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                e.target.classList.add('visible');
                observer.unobserve(e.target);
            }
        });
    }, { threshold: 0.08 });

    targets.forEach(el => observer.observe(el));
})();

/* ── Stat-number count-up animation ── */
document.querySelectorAll('.stat-number').forEach(el => {
    const raw = el.textContent.trim();
    const num = parseFloat(raw);
    if (isNaN(num) || raw === '-') return;
    const isFloat = raw.includes('.');
    const decimals = isFloat ? (raw.split('.')[1] || '').length : 0;
    let start = 0;
    const duration = 900;
    const step = (timestamp) => {
        if (!start) start = timestamp;
        const progress = Math.min((timestamp - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = (num * eased).toFixed(decimals);
        if (progress < 1) requestAnimationFrame(step);
        else el.textContent = raw;
    };
    // Only start when visible
    const obs = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) {
            requestAnimationFrame(step);
            obs.disconnect();
        }
    });
    obs.observe(el);
});
</script>
</body>
</html>
