<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap Hub</title>
</head>
<body>
<header>
    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'offer-list' %}">Offers</a>

        {% if request.user.is_authenticated %}
            <a href="{% url 'offer-create' %}">Create Offer</a>
            <a href="{% url 'my-offers' %}">My Offers</a>
            <a href="{% url 'favorite-offers' %}">Favorites</a>
            <a href="{% url 'my-bookings' %}">My Bookings</a>
            <a href="{% url 'mentor-bookings' %}">Mentor Bookings</a>

            <span>Hi, {{ request.user.username }}</span>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Sign out</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Sign in</a>
            <a href="{% url 'register' %}">Create account</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <small>&copy; {% now 'Y' %} SkillSwap Hub</small>
</footer>
</body>
</html>
