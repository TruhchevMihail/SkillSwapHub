{% extends 'common/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="h3 mb-4"><i class="bi bi-calendar-check"></i> Book a Session</h1>

        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <dl class="info-grid mb-0">
                    <dt>Offer</dt>    <dd>{{ offer.title }}</dd>
                    <dt>Mentor</dt>  <dd>{{ offer.owner.username }}</dd>
                    <dt>Price</dt>   <dd class="fw-semibold text-primary">€{{ offer.price_per_session }}</dd>
                    <dt>Duration</dt><dd>{{ offer.duration_minutes }} min</dd>
                </dl>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body django-form">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2 mt-2">
                        <button class="btn btn-primary" type="submit">Submit booking</button>
                        <a class="btn btn-outline-secondary" href="{% url 'offer-detail' offer.pk %}">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
