{% extends 'common/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="h3 mb-4"><i class="bi bi-person-lines-fill"></i> Edit Profile</h1>

        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <p class="mb-1"><strong>Username:</strong> {{ request.user.username }}</p>
                <p class="text-muted small mb-0">Username is permanent and cannot be changed.</p>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body django-form">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% include 'common/partials/form-errors.html' %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-primary" type="submit">Save changes</button>
                        <a class="btn btn-outline-secondary" href="{% url 'profile-detail' request.user.username %}">View profile</a>
                        <a class="btn btn-outline-secondary" href="{% url 'password-change' %}">Change password</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
