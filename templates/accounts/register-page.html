{% extends 'common/base.html' %}

{% block content %}
<section>
    <h1>Create your account</h1>
    <p>Join the community and share your skills.</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create account</button>
    </form>
</section>
{% endblock %}
