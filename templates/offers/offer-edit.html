{% extends 'common/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <h1 class="h3 mb-1">Edit offer</h1>
        <p class="text-muted mb-4">Update the details of your offer.</p>
        <div class="card shadow-sm">
            <div class="card-body django-form">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% include 'common/partials/form-errors.html' %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2 mt-2">
                        <button class="btn btn-primary" type="submit">Save changes</button>
                        <a class="btn btn-outline-secondary" href="{% url 'offer-detail' object.pk %}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
