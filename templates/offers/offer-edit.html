{% extends 'common/base.html' %}

{% block content %}
<div class="form-wrap-wide">
    <div class="page-header">
        <h1>Edit offer</h1>
        <p class="form-subtitle">Update the details of your offer.</p>
    </div>
    <div class="card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button class="btn btn-primary" type="submit">Save changes</button>
                <a class="btn btn-ghost" href="{% url 'offer-detail' object.pk %}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
