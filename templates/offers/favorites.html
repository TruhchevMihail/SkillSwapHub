{% extends 'common/base.html' %}

{% block content %}
    <h1>Favorite Offers</h1>

    {% if offers %}
        <ul>
            {% for offer in offers %}
                <li>
                    <a href="{% url 'offer-detail' offer.pk %}">{{ offer.title }}</a>
                    - {{ offer.owner.username }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No favorite offers yet.</p>
    {% endif %}
{% endblock %}
