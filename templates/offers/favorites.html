{% extends 'common/base.html' %}

{% block content %}
<h1 class="h3 mb-4">
    <i class="bi bi-bookmark-heart"></i> Saved Offers
</h1>

{% if offers %}
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {% for offer in offers %}
            <div class="col">
                {% include 'common/partials/offer-card.html' with show_owner=True %}
            </div>
        {% endfor %}
    </div>
{% else %}
    <div class="empty-state">
        <i class="bi bi-bookmark fs-1 d-block mb-3 text-muted"></i>
        <p>You haven't saved any offers yet.</p>
        <a class="btn btn-primary" href="{% url 'offer-list' %}">Browse offers</a>
    </div>
{% endif %}
{% endblock %}
